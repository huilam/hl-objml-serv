<html>
<head>
	<script type="text/javascript">
		var _ContextRoot = window.location.pathname.substring(0, window.location.pathname.indexOf("/",2));
	
		async function listOption(apiUrl, jsonAttrName, htmlElId) {
			const selectEl = document.getElementById(htmlElId);
			selectEl.disabled = true;
			selectEl.innerHTML = `<option>Loading plugins…</option>`;
			
			try {
		        const res = await fetch(apiUrl, {
					method: "GET",
			          headers: {
			              "Accept": "application/json"
			            }
		        });

		        if (!res.ok) throw new Error(`HTTP ${res.status} ${res.statusText}`);
		        const data = await res.json();
		        
		        const items = Array.isArray(data[jsonAttrName]) ? data[jsonAttrName]: [];
		        if (items.length === 0) {
		          selectEl.innerHTML = `<option disabled>No plugins found</option>`;
		          throw new Error("Response had no "+jsonAttrName);
		        }

		        // Build options
		        selectEl.innerHTML = "";
		        
		        opt = document.createElement("option");
		        opt.value = "";
		        opt.textContent = " --- selection(s) : "+items.length+" --- ";
		        selectEl.appendChild(opt);
		        for (const item of items) {
		          const opt = document.createElement("option");
		          opt.value = item;
		          opt.textContent = item;
		          selectEl.appendChild(opt);
		        }
		        selectEl.disabled = false;
		      } catch (err) {
		        selectEl.innerHTML = `<option disabled>Error loading plugins</option>`;
		        selectEl.disabled = true;
		      }
		}
	
		function listPlugins() {
			listOption(_ContextRoot+"/objml", "plugins", "pluginSelect");
		}
		
		function listTestImages() {
			listOption(_ContextRoot+"/image", "imageFileNames", "imageSelect");
		}
		
		function previewImage() {
			const imgEl = document.getElementById("imgPreview");
			imgEl.src=null;
			imgEl.alt=null;
			
			var selImageFileName = document.getElementById("imageSelect").value;
			imgEl.alt = selImageFileName;
			
			if(selImageFileName!="")
			{
				imgEl.src = _ContextRoot+"/image/"+selImageFileName+"?return=image";
				imgEl.alt = selImageFileName;
			}
			
		}
		
		function detectImage() {
			var selImageFileName = document.getElementById("imageSelect").value;
			var selPluginClassName = document.getElementById("pluginSelect").value;
			
			const imgEl = document.getElementById("detectPreview");
			imgEl.src = null;
			imgEl.alt = "perform detection ...";
			
			if(selImageFileName!= "" && selPluginClassName!= "")
			{
				imgEl.src = _ContextRoot+"/objml/plugin/"+selPluginClassName+"/detect/"+selImageFileName+"?return=image";
				imgEl.alt = selPluginClassName;
			}
			
		}
		
		function init()
		{
			listPlugins();
			listTestImages();
		}
	 
	</script>
</head>
<body onload="init()">
	<BR><BR>
	Test Images : <select id="imageSelect" disabled onchange="previewImage()"><option></option></select>
	<BR><BR>
	<img id="imgPreview" width=100 height=100/>
	
	<BR><BR><BR>
	Available ObjML Plugins :
	<BR><select id="pluginSelect" onchange="detectImage()" disabled><option></option></select>
	<BR><BR>
	<img id="detectPreview"/>
</body>
</html>
